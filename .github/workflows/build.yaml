name: promgithub Build

on:
  schedule:
    - cron: '0 15 * * 0'
  #push:
  #  branches:
  #    - main
  #pull_request:
  #  branches:
  #    - main

jobs:
  build:
    name: Build promgithub
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Golang
        uses: actions/setup-go@v5
        with:
          go-version: 1.22.5
        id: go

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Coverage
        run: make coverage

      # TODO: Temporarily disabled until I can fix the linting issues
      # - name: Lint
      #   uses: golangci/golangci-lint-action@v3
      #   with:
      #     version: v1.50.1

      - name: Build and push
        run: make container