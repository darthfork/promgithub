name: promgithub Build

on:
  schedule:
    - cron: '0 15 * * 0'
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    name: Build promgithub
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get go version
        id: go_version
        run: |
          GOVERSION=$(make go-version)
          echo "GOVERSION=${GOVERSION}" >> $GITHUB_ENV

      - name: Set up Golang
        uses: actions/setup-go@v5
        id: go
        with:
          go-version: ${{ env.GOVERSION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Coverage
        run: make coverage

      - name: Lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: v1.59.1
          only-new-issues: true
          args: --timeout=30m --config=./.golangci.yaml

      - name: Build Container
        run: make container
