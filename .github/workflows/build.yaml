name: Build promgithub

on:
  schedule:
    - cron: '0 15 * * 0'
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  unit-and-build:
    name: build and test
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment
        id: environment
        run: |
          GOVERSION=$(make go-version)
          echo "GOVERSION=${GOVERSION}" >> $GITHUB_ENV
          echo "DOCKER_BUILDKIT=1" >> $GITHUB_ENV
          echo "DOCKER_CLI_EXPERIMENTAL=enabled" >> $GITHUB_ENV

      - name: Set up Golang
        uses: actions/setup-go@v5
        id: go
        with:
          go-version: ${{ env.GOVERSION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Tools and Dependencies
        run: make install_tools

      - name: Lint
        run: make lint

      - name: Security Scan
        run: make security

      - name: Build
        run: make build

      - name: Unit Tests
        run: make unit-test

      - name: Coverage
        run: make coverage

      - name: Build Container
        run: make container

      - name: Container Security Scan
        run: make container-security

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment
        id: environment
        run: |
          GOVERSION=$(make go-version)
          echo "GOVERSION=${GOVERSION}" >> $GITHUB_ENV

      - name: Set up Golang
        uses: actions/setup-go@v5
        id: go
        with:
          go-version: ${{ env.GOVERSION }}

      - name: Install Tools and Dependencies
        run: make deps

      - name: Integration Tests
        run: make integration-test

  redis-integration-tests:
    name: Redis integration tests
    runs-on: ubuntu-24.04

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment
        id: environment
        run: |
          GOVERSION=$(make go-version)
          echo "GOVERSION=${GOVERSION}" >> $GITHUB_ENV
          echo "PROMGITHUB_REDIS_ADDR=127.0.0.1:6379" >> $GITHUB_ENV

      - name: Set up Golang
        uses: actions/setup-go@v5
        id: go
        with:
          go-version: ${{ env.GOVERSION }}

      - name: Install Tools and Dependencies
        run: make deps

      - name: Redis Integration Tests
        run: make redis-integration-test
