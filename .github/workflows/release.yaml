name: Release promgithub

on:
  push:
    branches:
      - main
    paths:
      - 'version'
  # For testing
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  USERNAME: darthfork
  REPO: promgithub

permissions:
  contents: write
  packages: write
  issues: write
  packages: write

jobs:
  release:
    name: Release promgithub
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Golang
        uses: actions/setup-go@v5
        with:
          go-version: 1.22.5
        id: go

      - name: Set up Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Get version
        run:  |
          source version
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create Tag
        run: |
          git tag -a ${{ env.VERSION }} -m "Release Version ${{ env.VERSION }}"
          git push origin ${{ env.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: make build

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ env.USERNAME }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Docker Image
        uses: docker/build-push-action@v3
        with:
          context: .
          registry: https://ghcr.io
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.USERNAME }}/${{ env.REPO }}:${{ env.VERSION }}

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ env.VERSION }}
          release_name: v${{ env.VERSION }}
          body: promgithub v${{ env.VERSION }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./build/promgithub
          asset_name: promgithub
          asset_content_type: application/octet-stream