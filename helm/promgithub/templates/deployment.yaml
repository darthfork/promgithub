apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "promgithub.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "promgithub.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit | default 10 }}
  selector:
    matchLabels:
      {{- include "promgithub.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "promgithub.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port | default 8080 }}
          env:
            - name: ENVIRONMENT
              value: "{{ .Values.environment | default "production" }}"
            {{- if .Values.redis.enabled }}
            - name: PROMGITHUB_REDIS_ADDR
              value: "{{ .Release.Name }}-redis-master:6379"
            {{- else if .Values.redisConfig.addr }}
            - name: PROMGITHUB_REDIS_ADDR
              value: "{{ .Values.redisConfig.addr }}"
            {{- end }}
            {{- if or .Values.redis.enabled .Values.redisConfig.addr }}
            - name: PROMGITHUB_REDIS_DB
              value: "{{ .Values.redisConfig.db }}"
            - name: PROMGITHUB_REDIS_KEY_PREFIX
              value: "{{ .Values.redisConfig.keyPrefix | default "promgithub" }}"
            - name: PROMGITHUB_REDIS_DELIVERY_TTL
              value: "{{ .Values.redisConfig.deliveryTTL | default "24h" }}"
            {{- end }}
          envFrom:
            - secretRef:
                name: "{{ include "promgithub.fullname" . }}"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
